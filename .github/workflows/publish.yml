name: Publish Extension

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build and package only, skip publishing'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Read package version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="${{ steps.pkg.outputs.version }}"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Compile
        run: npm run compile

      - name: Package VSIX
        run: npx --yes @vscode/vsce package --out "leetcode-practice-${{ steps.pkg.outputs.version }}.vsix"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: leetcode-practice-${{ steps.pkg.outputs.version }}
          path: leetcode-practice-${{ steps.pkg.outputs.version }}.vsix
          if-no-files-found: error

      - name: Publish to VS Code Marketplace
        if: ${{ !inputs.dry_run }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx --yes @vscode/vsce publish --packagePath "leetcode-practice-${{ steps.pkg.outputs.version }}.vsix"

      - name: Publish to Open VSX
        if: ${{ !inputs.dry_run }}
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx --yes ovsx publish "leetcode-practice-${{ steps.pkg.outputs.version }}.vsix" -p "$OVSX_PAT"

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run && startsWith(github.ref, 'refs/tags/v') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "leetcode-practice-${{ steps.pkg.outputs.version }}.vsix" \
            --title "v${{ steps.pkg.outputs.version }}" \
            --notes "See [CHANGELOG.md](./CHANGELOG.md) for release notes." \
            --verify-tag
